{{- /*
Optional Helm test for KEDA MSK Kafka consumer chart
This will NOT fail even if service is not defined
*/ -}}

{{- if .Values.tests.enabled | default false }}

apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "keda-msk.fullname" . }}-test"
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: kafka-test
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - echo "KEDA Kafka MSK chart is deployed successfully";
          echo "BootstrapServers={{ .Values.kafka.bootstrapServers }}";
          echo "Topic={{ .Values.kafka.topic }}";
          echo "ConsumerGroup={{ .Values.kafka.consumerGroup }}"

{{- end }}
